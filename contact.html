<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Braai Boss</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>
</head>
<body>
    <nav> </nav>

    <section class="container" style="margin-top: 80px;">
        <div class="grid" style="grid-template-columns: 1fr 1.5fr; gap: 4rem;">
            <div>
                <h2 class="gold-shimmer" style="font-size: 3rem;">GET IN<br>TOUCH</h2>
                <div class="section-divider" style="margin-left: 0;"></div>
                <p style="margin-bottom: 2rem;">Ready to bring the Braai Boss to your event? Use the form or contact us directly.</p>
                <p><i data-lucide="phone" style="color:#D4AF37"></i> +27 31 123 4567</p>
                <p><i data-lucide="mail" style="color:#D4AF37"></i> info@braaiboss.co.za</p>
            </div>
            
            <div class="contact-form card" style="padding: 2.5rem;">
                <form action="https://formspree.io/f/your-id" method="POST">
                    <input type="text" name="name" placeholder="Full Name" required>
                    <input type="email" name="email" placeholder="Email Address" required>
                    <select name="service">
                        <option>Catering Inquiry</option>
                        <option>General Question</option>
                    </select>
                    <textarea name="message" rows="5" placeholder="Tell us about your event details..."></textarea>
                    <button type="submit" class="btn-primary" style="width: 100%;">SEND MESSAGE</button>
                </form>
            </div>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
